<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suno</title>
  <style>
    :root {
      --color-sun: #FFCF57;
      --color-sun-dark: #E6A800;
      --color-sun-text: #7A4F00;
      --color-sun-bg: #FFF8E1;
      --color-sun-border: #FFE08A;
      --color-nav: #007EA7;
      --color-gray-2: #E0DDD8;
      --color-gray-3: #9A9590;
      --color-text: #1A1A1A;
      --color-white: #FFFFFF;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, 'Segoe UI', Arial, sans-serif; }

    .bootstrap-app-bar {
      height: 52px; background: var(--color-white);
      border-bottom: 0.5px solid var(--color-gray-2);
      display: flex; align-items: center; padding: 0 16px;
    }
    .bootstrap-logo { display: flex; align-items: center; gap: 7px; text-decoration: none; }
    .bootstrap-logo-mark {
      width: 28px; height: 28px; background: var(--color-sun);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
    }
    .bootstrap-logo-name { font-size: 15px; font-weight: 500; color: var(--color-text); }

    .bootstrap-body {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: calc(100vh - 52px); padding: 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .bootstrap-spinner-wrap {
      position: relative; width: 64px; height: 64px;
      display: flex; align-items: center; justify-content: center;
    }
    .bootstrap-ring {
      position: absolute; inset: 0; border-radius: 50%;
      border: 2.5px solid var(--color-sun-border);
      border-top-color: var(--color-sun);
      animation: spin 1.1s linear infinite;
    }
    .bootstrap-core {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--color-sun);
      display: flex; align-items: center; justify-content: center;
    }

    .bootstrap-text { text-align: center; margin-top: 20px; }
    .bootstrap-title {
      font-size: 17px; font-weight: 500; color: var(--color-text);
      letter-spacing: -0.02em; margin-bottom: 6px;
    }
    .bootstrap-sub {
      font-size: 12px; color: var(--color-gray-3); line-height: 1.6;
      max-width: 220px; margin: 0 auto;
    }

    @keyframes pulse-dot {
      0%, 80%, 100% { background: var(--color-gray-2); transform: scale(1); }
      40% { background: var(--color-sun); transform: scale(1.3); }
    }
    .bootstrap-dots { display: flex; gap: 5px; justify-content: center; margin-top: 20px; }
    .bootstrap-dots span {
      width: 6px; height: 6px; border-radius: 50%; background: var(--color-gray-2);
      animation: pulse-dot 1.4s ease-in-out infinite;
    }
    .bootstrap-dots span:nth-child(2) { animation-delay: 0.2s; }
    .bootstrap-dots span:nth-child(3) { animation-delay: 0.4s; }
    .bootstrap-loading-label {
      font-size: 11px; color: var(--color-gray-3); margin-top: 8px; text-align: center;
    }

    .bootstrap-noscript {
      background: var(--color-sun-bg); border: 0.5px solid var(--color-sun-border);
      border-radius: 8px; padding: 9px 12px;
      font-size: 11px; color: var(--color-sun-text); line-height: 1.5;
      display: flex; gap: 8px; align-items: flex-start;
      max-width: 480px; margin: 16px auto 0;
    }
    .bootstrap-noscript svg { flex-shrink: 0; margin-top: 1px; }
  </style>
</head>
<body>
  <div id="app">
    <header class="bootstrap-app-bar">
      <div class="bootstrap-logo">
        <div class="bootstrap-logo-mark">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <circle cx="8" cy="8" r="3" stroke="#7A4F00" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="8" y1="1" x2="8" y2="3" stroke="#7A4F00" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="8" y1="13" x2="8" y2="15" stroke="#7A4F00" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="1" y1="8" x2="3" y2="8" stroke="#7A4F00" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="13" y1="8" x2="15" y2="8" stroke="#7A4F00" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="2.93" y1="2.93" x2="4.34" y2="4.34" stroke="#7A4F00" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="11.66" y1="11.66" x2="13.07" y2="13.07" stroke="#7A4F00" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="13.07" y1="2.93" x2="11.66" y2="4.34" stroke="#7A4F00" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="4.34" y1="11.66" x2="2.93" y2="13.07" stroke="#7A4F00" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="bootstrap-logo-name">Suno</span>
      </div>
    </header>
    <main class="bootstrap-body" role="status" aria-label="Loading">
      <div class="bootstrap-spinner-wrap">
        <div class="bootstrap-ring"></div>
        <div class="bootstrap-core">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <circle cx="9" cy="9" r="4" fill="#7A4F00"/>
            <line x1="9" y1="1" x2="9" y2="3.5" stroke="#7A4F00" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="9" y1="14.5" x2="9" y2="17" stroke="#7A4F00" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="1" y1="9" x2="3.5" y2="9" stroke="#7A4F00" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="14.5" y1="9" x2="17" y2="9" stroke="#7A4F00" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="3.5" y1="3.5" x2="5.2" y2="5.2" stroke="#7A4F00" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="12.8" y1="12.8" x2="14.5" y2="14.5" stroke="#7A4F00" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="14.5" y1="3.5" x2="12.8" y2="5.2" stroke="#7A4F00" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="5.2" y1="12.8" x2="3.5" y2="14.5" stroke="#7A4F00" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
      <div class="bootstrap-text">
        <div class="bootstrap-title">Anticipate the sun<br>on your journey</div>
        <div class="bootstrap-sub">Real-time sun position along your itinerary. Plan with confidence.</div>
      </div>
      <div class="bootstrap-dots">
        <span></span><span></span><span></span>
      </div>
      <div class="bootstrap-loading-label">Loading…</div>
    </main>
    <noscript>
      <div class="bootstrap-noscript">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <circle cx="7" cy="7" r="5.5" stroke="#7A4F00" stroke-width="1.2"/>
          <line x1="7" y1="4" x2="7" y2="7.5" stroke="#7A4F00" stroke-width="1.3" stroke-linecap="round"/>
          <circle cx="7" cy="9.5" r="0.7" fill="#7A4F00"/>
        </svg>
        <div>If this screen does not go away, please enable JavaScript in your browser settings to use Suno.</div>
      </div>
    </noscript>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
