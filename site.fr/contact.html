<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Contactez l'équipe Direction Soleil. Partagez vos retours ou signalez un problème." />
    <link rel="stylesheet" href="style.css" />
    <base target="_top" />
    <title>Contact &mdash; Direction Soleil</title>

    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="manifest" href="/site.fr.webmanifest">
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#006b8f">
    <meta name="msapplication-TileColor" content="#2b5797">
    <meta name="theme-color" content="#fcfdff">
</head>

<body class="antialiased bg-white text-black">
    <header class="bg-white-50 border-b-2 border-yellow">
        <div class="mx-auto sm:px-7 px-4 max-w-screen-xl py-10">
            <nav class="flex items-center">
                <a href="/" class="text-xl text-blue-800 font-bold underline">DirectionSoleil.fr</a>
                <a href="https://github.com/yvzn/suno/" class="ml-auto text-blue-800 underline">Github</a>
            </nav>
        </div>
    </header>

    <section id="contact" class="px-4">
        <div class="mx-auto sm:px-7 px-4 max-w-screen-lg py-10 pb-20">
            <h1 class="text-2xl text-yellow-900 font-bold lg:text-4xl pb-8">Contact</h1>

            <p class="mb-8 text-base lg:text-xl">
                Partagez vos retours ou signalez un problème à l'équipe Direction Soleil.
            </p>

            <form id="contact-form" novalidate class="max-w-xl">
                <div class="mb-6">
                    <label for="comment"
                        class="block mb-2 text-sm font-semibold uppercase tracking-wider text-blue-900">
                        Votre message
                    </label>
                    <textarea
                        id="comment"
                        name="c"
                        rows="6"
                        required
                        aria-required="true"
                        aria-describedby="comment-hint"
                        placeholder="Votre retour, question ou signalement&#8230;"
                        class="w-full border border-gray-400 rounded-lg px-3 py-2 text-base focus:outline-none focus:ring-2 focus:ring-blue-600 resize-y"></textarea>
                    <p id="comment-hint" class="mt-1 text-sm text-gray-500">
                        Obligatoire. Maximum 2000 caractères.
                    </p>
                </div>

                <input type="hidden" id="technical-data" name="t" value="" />

                <p id="contact-status" role="status" aria-live="polite" class="mb-4 text-sm min-h-[1.5em]"></p>

                <button type="submit" id="submit-btn"
                    class="inline-block text-white bg-blue-700 rounded-lg font-bold border border-transparent px-8 py-2.5 cursor-pointer">
                    Envoyer
                </button>
            </form>
        </div>
    </section>

    <footer class="bg-silver px-4">
        <div class="mx-auto sm:px-7 px-4 max-w-screen-xl py-10">
            <div class="grid grid-cols-1 gap-0 md:grid-cols-2 flex-start">
                <p class="mb-8 text-sm text-center text-gray-600 md:text-left md:mb-0">&copy; 2025 &mdash; Yvan
                    Razafindramanana</p>
            </div>
        </div>
    </footer>

    <script>
        /* Populate technical data field from URL query parameter */
        (function () {
            var params = new URLSearchParams(window.location.search);
            var t = params.get('t');
            if (t) {
                var field = document.getElementById('technical-data');
                if (field) field.value = t;
            }
        })();

        /* Handle form submission */
        document.getElementById('contact-form').addEventListener('submit', function (event) {
            event.preventDefault();

            var form = event.target;
            var submitBtn = document.getElementById('submit-btn');
            var statusEl = document.getElementById('contact-status');
            var comment = form.elements['c'].value.trim();

            statusEl.textContent = '';
            statusEl.className = 'mb-4 text-sm min-h-[1.5em]';

            if (!comment) {
                statusEl.textContent = 'Veuillez saisir un message avant d\u2019envoyer.';
                statusEl.className = 'mb-4 text-sm min-h-[1.5em] text-red-600';
                form.elements['c'].focus();
                return;
            }

            if (comment.length > 2000) {
                statusEl.textContent = 'Votre message est trop long (maximum 2000 caract\u00e8res).';
                statusEl.className = 'mb-4 text-sm min-h-[1.5em] text-red-600';
                form.elements['c'].focus();
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Envoi\u2026';

            var params = new URLSearchParams();
            params.set('c', comment);
            var technicalData = form.elements['t'].value;
            if (technicalData) params.set('t', technicalData);

            var apiBase = '%VITE_API_URL%';
            var apiKey = '%VITE_API_KEY%';
            var url = apiBase + '/feedback?code=' + encodeURIComponent(apiKey);

            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params.toString(),
            })
                .then(function (response) {
                    if (response.ok || response.status === 201) {
                        statusEl.textContent = 'Votre message a \u00e9t\u00e9 envoy\u00e9. Merci\u00a0!';
                        statusEl.className = 'mb-4 text-sm min-h-[1.5em] text-green-700';
                        form.reset();
                    } else {
                        statusEl.textContent = 'L\u2019envoi a \u00e9chou\u00e9. Veuillez r\u00e9essayer.';
                        statusEl.className = 'mb-4 text-sm min-h-[1.5em] text-red-600';
                    }
                })
                .catch(function () {
                    statusEl.textContent = 'L\u2019envoi a \u00e9chou\u00e9. \u00cates-vous connect\u00e9\u00a0?';
                    statusEl.className = 'mb-4 text-sm min-h-[1.5em] text-red-600';
                })
                .finally(function () {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Envoyer';
                });
        });
    </script>
</body>

</html>
